name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.example.com
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          TWILIO_ACCOUNT_SID: placeholder-twilio-sid
          TWILIO_AUTH_TOKEN: placeholder-twilio-token
          TWILIO_PHONE_NUMBER: "+10000000000"
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          GOOGLE_MAPS_API_KEY: placeholder-google-maps-key
          RESEND_API_KEY: placeholder-resend-key
          FROM_EMAIL: bookings@capturethemomentphotobooths.com
          NEXT_PUBLIC_BASE_URL: https://placeholder.example.com
          CRON_SECRET: placeholder-cron-secret
          BASE_LOCATION_ZIP: "92618"
